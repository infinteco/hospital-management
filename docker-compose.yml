services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: hospital
      MYSQL_USER: hospital
      MYSQL_PASSWORD: hospital
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uhospital", "-phospital"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/hospital?useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: hospital
      DB_PASSWORD: hospital
      # Override in any real deployment.
      APP_JWT_SECRET: change-me-in-prod-please-use-a-long-random-secret-key
    ports:
      - "8080:8080"

volumes:
  mysql_data:
