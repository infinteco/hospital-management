name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      # ubuntu-latest ships a Docker daemon, so the Testcontainers integration
      # tests (real MySQL) run here even though they are skipped on machines
      # without a compatible Docker.
      - name: Build, lint and test
        run: mvn -B verify

      - name: Docker build (smoke)
        run: docker build -t hospital-management:ci .
